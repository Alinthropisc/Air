name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Format & Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Install clang-18 (C23 backend)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-18 libclang-18-dev
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100

      - name: rustfmt check
        run: cargo fmt --all -- --check

      - name: clippy (workspace, all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ── C23 static analysis ───────────────────────────────────────────────────
  clang-tidy:
    name: clang-tidy (C23)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install clang-18 + clang-tidy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-18 clang-tidy-18
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-18 100

      - name: Run clang-tidy on air-crypto native sources
        run: |
          for f in air-crypto/native/*.c; do
            clang-tidy-18 \
              -checks='-*,clang-analyzer-*,bugprone-*,performance-*,portability-*' \
              "$f" -- \
              -std=c23 \
              -Iair-crypto/include \
              -xc
          done

  # ── Security audit ────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit
